<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anfossi Valentin — Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <span class="highlight">ANFOSSI</span>
            <span>VALENTIN</span>
        </div>
        <img class="avatar" src="profile.png" alt="Portrait">
    </header>

    <main>
        <section class="portfolio-grid">

            <a class="tile" href="#">
                <img src="portfolio-3d.jpg" alt="Portfolio CG / 3D">
                <div class="tile-label">
                    <span>CG</span>
                    <span class="num">#01</span>
                </div>
            </a>

            <a class="tile" href="#">
                <img src="portfolio-2d.jpg" alt="Portfolio Réel">
                <div class="tile-label">
                    <span>REAL</span>
                    <span class="num">#02</span>
                </div>
            </a>

        </section>

        <section class="info-grid">
            <div class="info-block">
                <h2>#WHAT</h2>
                <p>#BLENDER #HOUDINI #SUBSTANCE #DRONE #PHOTO</p>
                <h2>#WHERE</h2>
                <p>FRANCE</p>
            </div>

            <div class="info-block">
                <h2>#WHO</h2>
                <nav class="links">
                    <a href="https://www.artstation.com/lebiff">ARTSTATION</a>
                    <a href="https://sketchfab.com/lebiff">SKETCHFAB</a>
                    <a href="mailto:valentin.anfossi@gmail.com">EMAIL</a>
                </nav>

            </div>
        </section>
    </main>

</body>
</html>
