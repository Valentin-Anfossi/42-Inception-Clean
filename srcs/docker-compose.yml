services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - wp-volume:/var/www/html
    networks:
      - inception_net
    env_file:
      - "./.env"
    depends_on:
      - wordpress

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    restart: always
    volumes: 
      - db-volume:/var/lib/mysql
    networks:
      - inception_net
    env_file:
      - "./.env"
    secrets:
      - sql_credentials
      - wp_credentials

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    restart: always
    volumes:
      - wp-volume:/var/www/html
    networks:
      - inception_net
    env_file:
      - "./.env"
    depends_on:
      - mariadb
    secrets:
      - sql_credentials
      - wp_credentials

volumes:
  wp-volume:
    driver_opts:
      type: none
      device: /home/vanfossi/data/wp_data
      o: bind
  db-volume:
    driver_opts:
      type: none
      device: /home/vanfossi/data/db_data
      o: bind

networks:
  inception_net:
    driver: bridge

secrets:
  sql_credentials:
    file: ../secrets/sql_credentials.txt
  wp_credentials:
    file: ../secrets/wp_credentials.txt